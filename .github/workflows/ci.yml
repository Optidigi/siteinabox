name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Repository configuration contracts
        run: |
          pnpm mcp:check
          pnpm docs:check
      - name: Shared package type checks
        run: pnpm packages:typecheck
      - name: Provider contract and catalog tests
        run: |
          pnpm --dir packages/contracts test
          pnpm --dir packages/site-renderer test
      - name: Reject obsolete generated-site providers
        run: pnpm run audit:provider-cutover
      - name: Legal release integrity
        run: |
          pnpm legal:check
          pnpm --dir packages/legal-content test

  cms-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Payload types
        run: |
          pnpm --dir apps/cms payload generate:types
          pnpm --dir apps/cms payload generate:importmap
        env:
          PAYLOAD_SECRET: ci-placeholder
          DATABASE_URI: postgres://placeholder@placeholder/placeholder
      - name: Payload dependency contract
        run: pnpm --dir apps/cms payload:contract
      - name: Type check
        run: pnpm --dir apps/cms typecheck
      - name: Responsive canvas contract
        run: pnpm --dir apps/cms check:responsive
      - name: Frontend boundary contract
        run: pnpm --dir apps/cms lint:ui-boundary
      - name: Frontend composition contract
        run: pnpm --dir apps/cms lint:ui-composition
      - name: Lint (no-css)
        run: pnpm --dir apps/cms lint:no-css

  cms-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: payload_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PAYLOAD_SECRET: ci-test-secret
      DATABASE_URI: postgres://payload:ci-password@localhost:5432/payload_test
      PAYLOAD_DISABLE_JOBS_AUTORUN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Payload types
        run: |
          pnpm --dir apps/cms payload generate:types
          pnpm --dir apps/cms payload generate:importmap
      - name: Run vitest (unit + integration)
        run: pnpm --dir apps/cms test

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: pnpm install --frozen-lockfile
      - run: pnpm site:build
      - run: pnpm site:test
      - name: Install site browser-test browser
        run: pnpm --dir apps/intake exec playwright install --with-deps chromium
      - name: Verify landing analytics consent lifecycle
        run: pnpm --dir apps/landing test:analytics-browser
      - run: pnpm intake:build
      - run: pnpm intake:test

  renderer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: pnpm install --frozen-lockfile
      - run: pnpm renderer:deploy-contract
      - run: pnpm renderer:typecheck
      - run: pnpm renderer:test
      - run: pnpm renderer:build
      - name: Install provider parity browser
        run: pnpm --dir apps/renderer exec playwright install --with-deps chromium
      - name: Verify analytics lifecycle ownership
        run: pnpm --dir apps/renderer test:analytics-browser
      - name: Hydrate and exercise provider catalog
        run: pnpm --dir apps/renderer test:provider-browser

  provider-parity:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case: [desktop-light, desktop-dark, mobile-light, mobile-dark]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: pnpm install --frozen-lockfile
      - name: Install provider parity browser
        run: pnpm --dir apps/renderer exec playwright install --with-deps chromium
      - name: Compare pinned provider pixels
        run: pnpm --dir packages/site-renderer visual:provider-parity
        env:
          SIAB_PROVIDER_PARITY_CASE: ${{ matrix.case }}
          SIAB_PROVIDER_PARITY_OUTPUT: artifacts/provider-parity-${{ matrix.case }}
      - name: Upload provider parity failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: provider-parity-failure-${{ matrix.case }}
          path: artifacts/provider-parity-${{ matrix.case }}
          if-no-files-found: ignore
