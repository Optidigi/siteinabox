name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Shared package type checks
        run: pnpm packages:typecheck

  cms-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cms
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Payload types
        run: |
          pnpm payload generate:types
          pnpm payload generate:importmap
        env:
          PAYLOAD_SECRET: ci-placeholder
          DATABASE_URI: postgres://placeholder@placeholder/placeholder
      - name: Payload dependency contract
        run: pnpm payload:contract
      - name: Type check
        run: pnpm typecheck
      - name: Responsive canvas contract
        run: pnpm check:responsive
      - name: Frontend boundary contract
        run: pnpm lint:ui-boundary
      - name: Frontend composition contract
        run: pnpm lint:ui-composition
      - name: Lint (no-css)
        run: pnpm lint:no-css

  cms-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cms
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: payload_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PAYLOAD_SECRET: ci-test-secret
      DATABASE_URI: postgres://payload:ci-password@localhost:5432/payload_test
      PAYLOAD_DISABLE_JOBS_AUTORUN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Payload types
        run: |
          pnpm payload generate:types
          pnpm payload generate:importmap
      - name: Run vitest (unit + integration)
        run: pnpm test

  site-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/site-template
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: pnpm install --frozen-lockfile
      - run: pnpm --ignore-workspace astro check
      - run: pnpm --ignore-workspace test
      - run: pnpm --ignore-workspace build

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: pnpm install --frozen-lockfile
      - run: pnpm site:build
      - run: pnpm site:test
      - run: pnpm intake:build
      - run: pnpm intake:test

  renderer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: pnpm install --frozen-lockfile
      - run: pnpm renderer:typecheck
      - run: pnpm renderer:build

  tenant-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: pnpm install --frozen-lockfile
      - run: pnpm tenant:amicare:build
      - run: pnpm tenant:amblast:build
