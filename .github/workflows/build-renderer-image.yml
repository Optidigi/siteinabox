name: build-renderer-image

on:
  push:
    branches: [main]
    paths:
      - "apps/renderer/**"
      - "packages/contracts/**"
      - "packages/site-renderer/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-renderer-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: optidigi/siteinabox-renderer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/renderer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RENDERER_SITE_URL=https://renderer.siteinabox.nl
            AMICARE_SITE_URL=https://ami-care.nl

      - name: Smoke start pushed image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile
          image_tag="$(printf '%s\n' "$IMAGE_TAGS" | head -n 1)"
          IMAGE_TAG="$image_tag" pnpm --dir apps/renderer smoke:packaged-image
