name: build-renderer-image

on:
  push:
    branches: [main]
    paths:
      - "apps/renderer/**"
      - "packages/contracts/**"
      - "packages/site-renderer/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-renderer-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: optidigi/siteinabox-renderer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/renderer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SITE_URL=https://amicare.optidigi.nl

      - name: Smoke start pushed image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          image_tag="$(printf '%s\n' "$IMAGE_TAGS" | head -n 1)"
          docker run --rm -d --name siteinabox-renderer-smoke \
            -e NODE_ENV=production \
            -e HOST=0.0.0.0 \
            -e PORT=4321 \
            -e SIAB_CMS_URL=https://admin.siteinabox.nl \
            -e SIAB_RENDERER_API_TOKEN=smoke \
            -e SITE_URL=http://127.0.0.1:4321 \
            -p 4321:4321 \
            "$image_tag"
          trap 'docker rm -f siteinabox-renderer-smoke >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4321/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs siteinabox-renderer-smoke
          exit 1
