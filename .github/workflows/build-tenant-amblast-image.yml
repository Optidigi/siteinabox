name: build-tenant-amblast-image

on:
  push:
    branches: [main]
    paths:
      - "sites/amblast/**"
      - ".github/workflows/build-tenant-amblast-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: optidigi/siteinabox-site-amblast

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=sha,prefix=sha-,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: sites/amblast
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=tenant-amblast
          cache-to: type=gha,mode=max,scope=tenant-amblast
          build-args: |
            SITE_URL=https://amblast.siteinabox.nl

      - name: Smoke-start pushed image
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        run: |
          set -euo pipefail
          container_name="amblast-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker logs "$container_name" > smoke-container.log 2>&1 || true
            docker rm -f "$container_name" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker pull "$IMAGE_REF"
          docker run --detach --name "$container_name" --publish 8080:80 "$IMAGE_REF"

          deadline=$((SECONDS + 60))
          until curl --fail --silent --show-error http://127.0.0.1:8080/; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              docker logs "$container_name" || true
              exit 1
            fi
            sleep 3
          done

      - name: Upload smoke-start logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-start-logs
          path: smoke-container.log
          if-no-files-found: ignore
