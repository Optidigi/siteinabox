server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (server-scoped). Note the nginx footgun: any location block
    # that uses `add_header` REPLACES (not appends to) inherited add_header directives.
    # We avoid this by NOT using add_header inside location blocks — cache behavior
    # is set via the `expires` directive instead, which sets Cache-Control implicitly
    # without disturbing this list.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://api.web3forms.com https://eu.posthog.com https://app.posthog.com" always;
    # HSTS only meaningful behind TLS — your reverse proxy will add it; uncomment if serving TLS direct.
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/xml+rss application/atom+xml image/svg+xml;

    # Hashed assets — long cache (Cache-Control: max-age=31536000 set by `expires`)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        try_files $uri =404;
    }

    # Images — moderate cache (Cache-Control: max-age=2592000)
    location ~* \.(?:png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
        expires 30d;
        try_files $uri =404;
    }

    # HTML — never cache (Cache-Control: no-cache)
    location ~* \.html$ {
        expires -1;
        try_files $uri =404;
    }

    # Plain-text infrastructure files
    location = /robots.txt    { default_type text/plain; }
    location = /sitemap.xml   { default_type application/xml; }
    location = /sitemap-index.xml { default_type application/xml; }
    location = /llms.txt      { default_type text/plain; }
    location = /humans.txt    { default_type text/plain; }
    location = /.well-known/security.txt { default_type text/plain; }

    # Default: try file → directory → .html → 404 status (which triggers error_page below)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
