packages:
  - "apps/*"
  - "packages/*"

overrides:
  "@esbuild-kit/core-utils>esbuild": "0.25.12"
  "monaco-editor>dompurify": "3.4.7"
  "next>postcss": "8.5.15"

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@vitest/expect@4.1.9"
  - "@vitest/mocker@4.1.9"
  - "@vitest/pretty-format@4.1.9"
  - "@vitest/runner@4.1.9"
  - "@vitest/snapshot@4.1.9"
  - "@vitest/spy@4.1.9"
  - "@vitest/ui@4.1.9"
  - "@vitest/utils@4.1.9"
  - "js-yaml@4.2.0"
  - "undici@7.27.0"
  - "vitest@4.1.9"

allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  core-js: true
  esbuild: true
  sharp: true
  unrs-resolver: true
