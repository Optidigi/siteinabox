# Production compose for the SiteInABox CMS.
# Deploy path on VPS: /srv/saas/infra/stacks/siteinabox/apps/cms/compose.yml
# Pulls image from ghcr.io. Postgres lives alongside on the internal network.
# Reverse proxying handled by the shared Traefik edge on the external proxy network.
name: siteinabox-cms

services:
  siteinabox-cms:
    image: ghcr.io/optidigi/siteinabox-cms:latest
    pull_policy: always
    container_name: siteinabox-cms
    restart: unless-stopped
    environment:
      DATABASE_URI: postgres://payload:${POSTGRES_PASSWORD}@postgres:5432/payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_PREVIEW_SECRET: ${BETTER_AUTH_PREVIEW_SECRET:-}
      BETTER_AUTH_ALLOWED_HOSTS: ${BETTER_AUTH_ALLOWED_HOSTS:-}
      BETTER_AUTH_API_KEY: ${BETTER_AUTH_API_KEY:-}
      BETTER_AUTH_API_URL: ${BETTER_AUTH_API_URL:-}
      BETTER_AUTH_KV_URL: ${BETTER_AUTH_KV_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      PREVIEW_HMAC_SECRET: ${PREVIEW_HMAC_SECRET:-}
      DATA_DIR: /data-out
      NEXT_PUBLIC_SUPER_ADMIN_DOMAIN: ${SUPER_ADMIN_DOMAIN:-siteinabox.nl}
      NEXT_PUBLIC_VPS_IP: ${VPS_IP}
      SITE_URL: ${SITE_URL:-https://admin.siteinabox.nl}
      SIAB_RENDERER_API_TOKEN: ${SIAB_RENDERER_API_TOKEN:-}
      STATUS_MONITOR_INVENTORY_TOKEN: ${STATUS_MONITOR_INVENTORY_TOKEN:-}
      CLOUDFLARE_EMAIL_SMTP_TOKEN: ${CLOUDFLARE_EMAIL_SMTP_TOKEN:-}
      KVK_API_KEY: ${KVK_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@siteinabox.nl}
      SIAB_EMAIL_PREFERENCE_SECRET: ${SIAB_EMAIL_PREFERENCE_SECRET:-}
      SIAB_PUBLIC_POST_RATE_LIMIT_POINTS: ${SIAB_PUBLIC_POST_RATE_LIMIT_POINTS:-10}
      SIAB_PUBLIC_POST_RATE_LIMIT_WINDOW_SECONDS: ${SIAB_PUBLIC_POST_RATE_LIMIT_WINDOW_SECONDS:-60}
      SIAB_FORM_TARGET_RATE_LIMIT_POINTS: ${SIAB_FORM_TARGET_RATE_LIMIT_POINTS:-50}
      SIAB_FORM_TARGET_RATE_LIMIT_WINDOW_SECONDS: ${SIAB_FORM_TARGET_RATE_LIMIT_WINDOW_SECONDS:-3600}
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      MOLLIE_SITE_PAYMENT_AMOUNT: ${MOLLIE_SITE_PAYMENT_AMOUNT:-}
      MOLLIE_SITE_PAYMENT_CURRENCY: ${MOLLIE_SITE_PAYMENT_CURRENCY:-EUR}
      MOLLIE_SITE_RENEWAL_AMOUNT: ${MOLLIE_SITE_RENEWAL_AMOUNT:-}
      MOLLIE_SITE_RENEWAL_CURRENCY: ${MOLLIE_SITE_RENEWAL_CURRENCY:-EUR}
      MOLLIE_SITE_SUBSCRIPTION_INTERVAL: ${MOLLIE_SITE_SUBSCRIPTION_INTERVAL:-1 month}
      MOLLIE_WEBHOOK_BASE_URL: ${MOLLIE_WEBHOOK_BASE_URL:-}
      MOLLIE_WEBHOOK_SIGNING_SECRET: ${MOLLIE_WEBHOOK_SIGNING_SECRET:-}
      OPENPROVIDER_USERNAME: ${OPENPROVIDER_USERNAME:-}
      OPENPROVIDER_PASSWORD: ${OPENPROVIDER_PASSWORD:-}
      OPENPROVIDER_API_BASE_URL: ${OPENPROVIDER_API_BASE_URL:-}
      OPENPROVIDER_TECH_HANDLE: ${OPENPROVIDER_TECH_HANDLE:-}
      OPENPROVIDER_BILLING_HANDLE: ${OPENPROVIDER_BILLING_HANDLE:-}
      OPENPROVIDER_NS_GROUP: ${OPENPROVIDER_NS_GROUP:-}
      OPENPROVIDER_NAMESERVERS: ${OPENPROVIDER_NAMESERVERS:-}
      OPENPROVIDER_DOMAIN_MAX_COST_AMOUNT: ${OPENPROVIDER_DOMAIN_MAX_COST_AMOUNT:-10.00}
      OPENPROVIDER_DOMAIN_MAX_COST_CURRENCY: ${OPENPROVIDER_DOMAIN_MAX_COST_CURRENCY:-EUR}
      OPENPROVIDER_DOMAIN_MAX_OFFER_AMOUNT: ${OPENPROVIDER_DOMAIN_MAX_OFFER_AMOUNT:-}
      OPENPROVIDER_DOMAIN_MAX_OFFER_CURRENCY: ${OPENPROVIDER_DOMAIN_MAX_OFFER_CURRENCY:-EUR}
      OPENPROVIDER_DOMAIN_FIXED_PRICE_AMOUNT: ${OPENPROVIDER_DOMAIN_FIXED_PRICE_AMOUNT:-}
      OPENPROVIDER_DOMAIN_FIXED_PRICE_CURRENCY: ${OPENPROVIDER_DOMAIN_FIXED_PRICE_CURRENCY:-EUR}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_RENDERER_TARGET: ${CLOUDFLARE_RENDERER_TARGET:-}
      SIAB_RENDERER_TARGET_HOST: ${SIAB_RENDERER_TARGET_HOST:-}
      SIAB_RENDERER_TARGET_IP: ${SIAB_RENDERER_TARGET_IP:-}
      SITE_GENERATION_PROVIDER: ${SITE_GENERATION_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SITE_GENERATION_OPENAI_MODEL: ${SITE_GENERATION_OPENAI_MODEL:-gpt-5.5}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
      POSTHOG_PUBLIC_HOST: ${POSTHOG_PUBLIC_HOST:-}
      POSTHOG_PROJECT_TOKEN: ${POSTHOG_PROJECT_TOKEN:-}
      POSTHOG_PROJECT_ID: ${POSTHOG_PROJECT_ID:-}
      POSTHOG_PERSONAL_API_KEY: ${POSTHOG_PERSONAL_API_KEY:-}
      POSTHOG_ENVIRONMENT: ${POSTHOG_ENVIRONMENT:-production}
      POSTHOG_ANALYTICS_DISABLED: ${POSTHOG_ANALYTICS_DISABLED:-}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      ENABLE_LEGACY_PREVIEW_TOKEN_ROUTE: ${ENABLE_LEGACY_PREVIEW_TOKEN_ROUTE:-}
      ENABLE_GRAPHQL_PLAYGROUND: ${ENABLE_GRAPHQL_PLAYGROUND:-}
      NODE_ENV: production
      PORT: "3000"
      # Default already baked into the image (Dockerfile ENV); kept here so
      # ops can grep the compose file and see the binding without spelunking
      # into the Dockerfile. Don't change without coordinating with healthcheck.
      HOSTNAME: "0.0.0.0"
    volumes:
      # Per-tenant data lands here. Each SSR site container later RO-mounts
      # tenants/<id>/ from this same path. DATA_HOST_PATH overridable via .env;
      # defaults to /srv path (ops convention with root). Override with a
      # home-dir path when running as a non-root deploy user.
      - ${DATA_HOST_PATH:-/srv/data/saas/siab-payload}:/data-out
    networks: [proxy, internal]
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.siteinabox-cms.rule=Host(`admin.siteinabox.nl`) || Host(`admin.ami-care.nl`) || Host(`preview.siteinabox.nl`)
      - traefik.http.routers.siteinabox-cms.entrypoints=websecure
      - traefik.http.routers.siteinabox-cms.tls.certresolver=letsencrypt
      - traefik.http.routers.siteinabox-cms.middlewares=hsts@docker
      - traefik.http.routers.siteinabox-cms.service=siteinabox-cms
      - traefik.http.routers.siteinabox-cms-intake-api.rule=(Host(`siteinabox.nl`) || Host(`www.siteinabox.nl`)) && PathPrefix(`/api/intake`)
      - traefik.http.routers.siteinabox-cms-intake-api.entrypoints=websecure
      - traefik.http.routers.siteinabox-cms-intake-api.tls.certresolver=letsencrypt
      - traefik.http.routers.siteinabox-cms-intake-api.middlewares=hsts@docker
      - traefik.http.routers.siteinabox-cms-intake-api.priority=250
      - traefik.http.routers.siteinabox-cms-intake-api.service=siteinabox-cms
      - traefik.http.routers.siteinabox-cms-contact-api.rule=(Host(`siteinabox.nl`) || Host(`www.siteinabox.nl`)) && PathPrefix(`/api/contact`)
      - traefik.http.routers.siteinabox-cms-contact-api.entrypoints=websecure
      - traefik.http.routers.siteinabox-cms-contact-api.tls.certresolver=letsencrypt
      - traefik.http.routers.siteinabox-cms-contact-api.middlewares=hsts@docker
      - traefik.http.routers.siteinabox-cms-contact-api.priority=250
      - traefik.http.routers.siteinabox-cms-contact-api.service=siteinabox-cms
      - traefik.http.services.siteinabox-cms.loadbalancer.server.port=3000
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  postgres:
    image: postgres:18-alpine
    container_name: siteinabox-cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
    # Preserve the pre-monorepo production DB volume while moving container and
    # Compose names to the siteinabox-* convention.
    name: siab-payload_postgres-data

networks:
  proxy:    { external: true }   # shared Traefik edge network
  internal:                       # private — CMS <-> postgres only
