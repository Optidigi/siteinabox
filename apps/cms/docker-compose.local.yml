# Local-dev Postgres for the SiteInABox CMS.
# Run on the developer machine (any platform with a Docker engine):
#   docker compose -f docker-compose.local.yml up -d
# DATABASE_URI in .env.example targets localhost:5432 so this works out of the box.
# See docs/runbooks/local-dev.md for the full workflow.
#
# If port 5432 is already in use locally (e.g. a system Postgres), override:
#   POSTGRES_HOST_PORT=5433 docker compose -f docker-compose.local.yml up -d
# and update DATABASE_URI in your .env to match.
services:
  postgres:
    image: postgres:18-alpine
    container_name: siteinabox-cms-postgres-dev
    restart: unless-stopped
    ports:
      # Host port is configurable so devs with a system Postgres on 5432 can override.
      # Default 5432 matches the DATABASE_URI in .env.example.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - siteinabox-cms-postgres-dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  siteinabox-cms-postgres-dev:
