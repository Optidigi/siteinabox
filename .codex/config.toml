[mcp_servers.better-auth]
url = "https://mcp.better-auth.com/mcp"
enabled = true
required = false
default_tools_approval_mode = "auto"

[mcp_servers.cloudflare-api]
url = "https://mcp.cloudflare.com/mcp"
enabled = false
required = false
default_tools_approval_mode = "prompt"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@3.2.4"]
enabled = true
required = false
default_tools_approval_mode = "auto"

[mcp_servers.docker]
command = "npx"
args = ["-y", "mcp-server-docker@1.0.0"]
enabled = false
required = false
default_tools_approval_mode = "prompt"

[mcp_servers.github]
command = "docker"
args = ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "-e", "GITHUB_READ_ONLY", "-e", "GITHUB_TOOLSETS", "ghcr.io/github/github-mcp-server@sha256:2b0c48b070f61e9d3969269ead600f62d00fb237b60ac849ef3d166ee7de9ad3", "stdio"]
enabled = true
required = false
default_tools_approval_mode = "auto"
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]
env = { "GITHUB_READ_ONLY" = "1", "GITHUB_TOOLSETS" = "repos,issues,pull_requests,actions" }

[mcp_servers.postgres]
command = "npx"
args = ["-y", "@bytebase/dbhub@0.23.0", "--transport", "stdio", "--config", ".mcp/dbhub-postgres.toml"]
enabled = false
required = false
default_tools_approval_mode = "auto"
env_vars = ["SIAB_MCP_POSTGRES_URL"]
cwd = ".."

[mcp_servers.posthog]
url = "https://mcp.posthog.com/mcp"
enabled = false
required = false
default_tools_approval_mode = "prompt"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking@2026.7.4"]
enabled = true
required = false
default_tools_approval_mode = "auto"

[mcp_servers.shadcn]
command = "npx"
args = ["-y", "shadcn@4.13.1", "mcp"]
enabled = true
required = false
default_tools_approval_mode = "prompt"
