[mcp_servers.better-auth]
url = "https://mcp.better-auth.com/mcp"
enabled = true
required = false
default_tools_approval_mode = "auto"

[mcp_servers.cloudflare-api]
url = "https://mcp.cloudflare.com/mcp"
enabled = false
required = false
default_tools_approval_mode = "prompt"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@3.2.4"]
enabled = true
required = false
default_tools_approval_mode = "auto"

[mcp_servers.docker]
command = "npx"
args = ["-y", "mcp-server-docker@1.0.0"]
enabled = true
required = false
default_tools_approval_mode = "prompt"

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github@2025.4.8"]
enabled = false
required = false
default_tools_approval_mode = "prompt"
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]

[mcp_servers.postgres]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres@0.6.2", "${SIAB_MCP_POSTGRES_URL}"]
enabled = false
required = false
default_tools_approval_mode = "prompt"
env_vars = ["SIAB_MCP_POSTGRES_URL"]

[mcp_servers.posthog]
url = "https://mcp.posthog.com/mcp"
enabled = false
required = false
default_tools_approval_mode = "prompt"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking@2026.7.4"]
enabled = true
required = false
default_tools_approval_mode = "auto"

[mcp_servers.shadcn]
command = "npx"
args = ["-y", "shadcn@4.13.1", "mcp"]
enabled = true
required = false
default_tools_approval_mode = "prompt"
